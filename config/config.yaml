data:
  tushare_token: ${TUSHARE_TOKEN}
  start_date: '2020-01-01'
factor:
  windows:
  - 5
  - 10
  - 20
  - 60
# DEPRECATED (2026-07-05): min_abs_ic: 0.02
# DEPRECATED (2026-07-05): min_ic_ir: 0.1
  decay_horizons:
  - 1
  - 5
  - 20
  enable_quality: false
alpha:
  # 2026-07-03: intersection → ic_weighted (see HANDOFF for analysis)
  method: ic_weighted
  train_window: 252
  retrain_freq: 20
  top_fraction: 0.3
  intersection_top_fraction: 0.2
  intersection_primary: gap_5d
risk:
  covariance_method: ledoit_wolf
  covariance_window: 60
  max_single_position: 1.0
  stop_loss_pct: 0.15
  max_positions: 1
  min_daily_amount: 500000
  exclude_star_st: true
  exclude_markets:
  - BJ
optimizer:
  method: equal_weight
  rebalance_freq: weekly
  min_holding_days: 5
  equal_weight_cap: 20000
execution:
  commission: 0.0003
  min_commission: 5
  stamp_tax: 0.001
  slippage: 0.001
backtest:
  benchmark: '000300'
web:
  port: 8521

# API 缓存 & 分布式限流 (ADR 014)
# Redis 仅做 API 去重 + 限流, 消费者不从 Redis 读数据 (从 SQLite 读)。
# Redis 不可达时自动降级为 NoopBackend (无缓存、不限流)。
cache:
  redis:
    host: localhost
    port: 6379
    db: 0
screening:
# DEPRECATED (2026-07-05): min_abs_ic: 0.02
# DEPRECATED (2026-07-05): min_ic_ir: 0.1
