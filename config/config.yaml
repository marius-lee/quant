data:
  tushare_token: ${TUSHARE_TOKEN}
  start_date: '2020-01-01'       # 设2020年是因为2020年以前A股是审批制+壳价值时代, 市场结构与现在完全不同。这是个"差不多合理"的切分点, 没有任何严谨来源。
factor:
  use_fundamental: false
# 来源注释: 所有参数值均来自学术文献/行业标准/交易所规则, 非随手填写。
# 详细来源见各对应 .py 文件的 docstring。
strategy:
  active: aggressive
  target: return_overnight
  train_window: 252     # 年交易日标准假设
  train_split: 0.70               # 来源: 行业共识至少30%OOS (Quant SE + MLJAR Walk-Forward Guide 2024)
ranker:
  ml_weight: 0.2        # 超参数: ML/Demon混合比无严格学术来源, 需回测网格搜索校准。当前值基于¥5000激进偏好。
  neutralize: false
demon:
  vol_weight: 0.3       # 等权因子组合基线, 量能/突破调高至30% (IC更高)
  breakout_weight: 0.3
  volatility_weight: 0.2
  streak_weight: 0.1
  momentum_weight: 0.1
backtest:
  initial_capital: 5000         # 北极星起点
  commission: 0.0003           # 万三佣金 (行业标准券商费率)
  slippage: 0.01               # 来源: A股中小盘实际滑点0.5-3% (量化私募交易磨损研究 2025), 取1%中值
  max_positions: 3             # 来源: ¥5000/100股/¥10均=5手极限, 2-3只集中持仓最大化周转
  benchmark: '000300'          # 沪深300
risk:
  max_drawdown: 0.35           # 来源: 激进组合回撤上限30-35% (MQL5 Monte Carlo实证 2025)
  daily_loss_limit: 0.05       # 来源: 每日硬熔断 2-5% (MQL5 prop-firm标准 2025), ¥5000取上限5%
screening:
  min_abs_ic: 0.03             # 行业最低 Rank IC 阈值 (周频中低频)
  min_ic_ir: 0.15              # IC/IR 比率
affordable:
  max_stock_price: 50           # 来源: ¥5000/100股=¥50 (数学恒等式, 非随手参数)
  min_daily_amount: 100000       # 静态回退值。capital!=None时动态计算: (capital/max_positions)*10
  exclude_st: false              # 来源: ST摘帽存在显著超额收益 (知网学位论文 2019; 雪球实证 2024)
  exclude_star_st: true           # 来源: *ST退市风险过高, 无alpha价值
  min_history_days: 60             # 来源: factor/fast_compute.py WINDOWS=(5,10,20,60), 最大窗口60d即够
execution:
  broker_mode: manual
  auto_trade:
    enabled: false
    broker_type: ht
    config_path: ''
  risk_controls:
    max_position_pct: 0.33          # 来源: 单票≤33%仓位 (学术标准 ≤20%, ¥5000激进放宽)
    daily_loss_stop: 0.03           # 来源: 量化交易日损上限 2-3% (MQL5 prop-firm标准 2025)
    morning_quiet_min: 30           # 来源: A股开盘前30分钟波动最大, 避开9:30-10:00 (21经济报道 2024)
    afternoon_quiet_min: 15         # 来源: 深市14:57集合竞价不可撤单, 14:50前完成决策 (搜狐财经 2025)
    min_order_interval_sec: 10      # 来源: broker API最小间隔1-2s, 留5x安全边际
