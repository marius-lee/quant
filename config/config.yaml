alpha:
  combine_mode: sleeve
  intersection_primary: gap_5d
  intersection_top_fraction: 0.2
  method: ic_weighted
  retrain_freq: 20
  sleeve:
    min_factors: 1
    positions_per_factor: 20
  top_fraction: 0.3
  train_window: 500
attribution:
  annual_periods: 252
  risk_free_rate: 0.02
backtest:
  benchmark: '000300'
  default_capital: 100000
  default_end: '2026-06-30'
  default_start: '2023-01-01'
  lot_size: 100
  min_backtest_days: 250
  rebalance_interval_days: 5
cache:
  redis:
    db: 0
    host: localhost
    port: 6379
calendar:
  max_lookup_days: 30
data:
  batch_size: 50
  derived_ratio_max: 100
  gap_fill_limit: 100
  lookback_days: 365
  pe_max: 200
  stale_days: 250
  start_date: '2020-01-01'
  tushare_token: ${TUSHARE_TOKEN}
  rate_limit:
    akshare_per_stock_sec: 1.5
    akshare_industry_sec: 0.8
    tushare_batch_sec: 0.4
  fetch:
    max_lookback_days: 2000
execution:
  commission: 0.0003
  min_commission: 5
  slippage: 0.001
  stamp_tax: 0.001
factor:
  accruals:
    max: 1
    min: -1
  amihud:
    min_valid_days: 30
    min_valid_ratio: 0.5
    scale: 1000000
  compute:
    zscore_min_count: 30
  debt_ratio:
    max: 2
    min: 0
  decay_horizons:
  - 1
  - 5
  - 20
  enable_quality: false
  evaluation:
    backtest_start_date: '2010-01-01'
    cpcv_groups: 5
    cpcv_test_groups: 1
    embargo_days: 1
    lookback: 120
    max_workers: 4  # P78: M1 4P-core, ThreadPoolExecutor 最优线程数
    worker_timeout_sec: 300  # P78: ThreadPoolExecutor 5min timeout
    min_abs_ic: 0.02
    min_half_life: 20
    min_icir: 0.5
    n_days: 120
    n_symbols: 500
    net_sharpe_min: 0.3
    pbo_max: 0.3
    sharpe_decay_max: 0.5
    t_threshold: 2.0
  high52w:
    clip_high: 2
    clip_low: -2
  idio_vol:
    min_common_obs: 10
  roe_ratio:
    max: 100
    min: 0
  roe_reported:
    max: 1
    min: -1
  stats:
    ic_min_periods: 20
    lookback_amplification: 1.5
    min_valid_days: 30
    snapshot_ttl_sec: 86400
  synth:
    zscore_clip: 3.0
  turnover_rev:
    fallback_count: 50
  windows:
    amihud: 250
    downside_volatility: 126
    idiosyncratic_vol: 126
    intraday_range: 20
    lhb_net_buy: 20
    max_return: 20
    skewness: 60
    volatility: 126
    volume_ratio_long: 20
    volume_ratio_short: 5
optimizer:
  method: equal_weight
  min_holding_days: 5
  rebalance_freq: weekly
risk:
  covariance:
    min_periods: 30
    window: 60
  covariance_method: ledoit_wolf
  covariance_window: 60
  exclude_markets:
  - BJ
  exclude_star_st: true
  max_positions: 20
  max_sector_exposure: 0.4
  max_single_position: 0.05
  min_daily_amount: 500000
  min_price: 2
  neutralize:
    min_common_stocks: 30
    min_stocks_per_industry: 3
  rolling_window: 60
  stop_loss_pct: 0.15
  stop_profit_pct: 0.20
screening:
  backtest_end: '2026-06-30'
  backtest_start: '2025-06-30'
  timeout: 600
data:
  http_timeout:
    sina: 10       # 新浪行情 HTTP 超时 (秒)
    tushare: 10    # Tushare API HTTP 超时 (秒)
    tencent: 15    # 腾讯行情 API HTTP 超时 (秒)
    sse: 20        # 上交所 SSE API HTTP 超时 (秒)
  api_delay:
    fund_hold: 2   # 基金持仓 API 限频间隔 (秒)
    margin: 4      # 融资融券 SSE API 限频间隔 (秒)
    margin_page: 5 # 融资融券翻页间隔 (秒)
monitor:
  alert:
    drawdown_critical: 0.20   # 累计回撤 ≥20% → critical 告警
    drawdown_warning: 0.10    # 累计回撤 ≥10% → warning 告警
quant:
  scheduler:
    poll_interval: 30         # 调度器轮询间隔 (秒), 业界标准 ≤60s
sync:
  daily_interval: 3           # 日线同步 API 间隔 (秒)
web:
  port: 8521
