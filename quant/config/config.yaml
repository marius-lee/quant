alpha:
  combine_mode: sleeve
  intersection_primary: gap_5d
  intersection_top_fraction: 0.2
  method: ic_weighted
  retrain_freq: 60
  weekly_weight: 0.3       # MultiTimeframe: 周线信号权重 (0=只用日线, 0.5=等权, 来源: Faber 2007)
  sector_rotation: true    # SectorRotator: 启用美林时钟行业轮动
  sleeve:
    min_factors: 1
    positions_per_factor: 20
  top_fraction: 0.3
  train_window: 500
attribution:
  annual_periods: 252
  risk_free_rate: 0.02
  ic_degradation_threshold: 0.3   # IC 衰减检测阈值; 来源: 当日IC与滚动均值偏离>30%时标记退化
  ic_rolling_window: 20           # P4: IC 滚动窗口 (交易日); 来源: 一个月交易日, 减少误判 (5→20)
  monitoring_buffer_days: 10      # monitoring→retired 缓冲天数; 来源: 两交易周, 防单日噪声误杀
  promotion_stability_days: 5     # P2: monitoring→active 连续稳定天数; 来源: 一周交易日, 确认IC恢复非噪声
  oos_warn_threshold: 0.5         # P3: OOS/IS IC比率告警阈值; 来源: OOS衰减>50%→告警 (明汯标准)
  snapshot_keep_days: 90
# ── G1: 在线 Walk-Forward OOS 验证 ──
oos_verify:
  train_window_days: 60        # 训练窗口 (交易日); 来源: 一个季度, IS 估计
  test_window_days: 10         # 测试窗口 (交易日); 来源: 两周, OOS 验证
  decay_warn_threshold: 0.5    # OOS/IS 衰减告警阈值; 来源: 明汯标准, 衰减>50%→警告          # IC 快照保留天数; 来源: 一个季度, 足够回看且不膨胀DB
backtest:
  benchmark: '000300'
  default_capital: 5000
  default_end: '2026-06-30'
  default_start: '2023-01-01'
  lot_size: 100
  min_backtest_days: 250
  rebalance_interval_days: 5
  universe_size: 800  # 回测股票池大小, 按日均成交额取前 N 只 (Gap 性能优化)
  #   冒烟测试覆盖: run_backtest(universe_size=300) → A档200-300只
  universe_turnover_days: 7       # 按近 N 日平均成交额截断 universe; 来源: 业界标准 5-20 日窗口
  diagnosis_ic_window: 120        # 回测前 IC 滚动窗口; 来源: 与 factor.evaluation.lookback 一致
  #   冒烟测试覆盖: run_backtest(ic_lookback=60) → A档60天
  progress_log_interval: 60       # 进度日志输出间隔; 来源: 月频输出(≈60交易日/季)
  min_trading_days: 10            # 最少交易日; 来源: 至少 2 个自然周
  #   冒烟测试覆盖: run_backtest() 走此值
  universe_filter_affordable: true  # 筛掉一手都买不起的股票; 来源: 减少无效计算, 聚焦可交易标的
cache:
calendar:
  max_lookup_days: 30

benchmark:
  start_date: '2025-12-01'        # 沪深 300 基准回看起始; 来源: 2025-12 起 A 股波动特征切换

data:
  batch_size: 50
  derived_ratio_max: 100
  gap_fill_limit: 100
  lookback_days: 365
  pe_max: 200
  stale_days: 250
  start_date: '2020-01-01'
  benchmark_start_date: '2020-01-01'  # 基准对比起始日; 来源: 沪深300可追溯日
  tushare_token: "aeeb8c7d0bdeb7d3e63e737490f3e8f9e97198ec6c85c6978d44f4ae"
  tickflow_api_key: "tk_868557a55bac4d1e859bf5be94087550"  # tickflow 免费注册版; 来源: tickflow.org 控制台
  rate_limit:
    # -- 批量源 --
    tushare_batch_sec: 1.2            # tushare 批量间隔; 来源: 50次/分钟免费额度 → 50批/分钟需≥1.2s/批
    tushare_calls_per_minute: 50     # tushare 免费版接口调用限制; 来源: https://tushare.pro/document/1?doc_id=108
    akshare_calls_per_minute: 60     # akshare/eastmoney 接口调用限制; 来源: 实测 eastmoney CDN 免费端约 60次/分钟
    tickflow_batch_sec: 1.5           # tickflow 批量间隔; 来源: 实测 20只/1.2s, 加 0.3s 安全边际
    tickflow_quote_batch_sec: 6       # tickflow 实时行情(换手率回填)批次间隔; 来源: 免费版 10次/分钟限速, 5只/批→6s/批
    # -- 逐只源 --
    zzshare_per_stock_sec: 0.3        # zzshare 逐只间隔; 来源: 实测 0.2s, 加 0.1s 安全边际
    pytdx_per_stock_sec: 1.0          # pytdx TCP 逐只间隔; 来源: TCP 连接开销大(connect+disconnect), 保守 1s
    sina_per_stock_sec: 0.5           # sina HTTP 逐只间隔; 来源: 免费 HTTP 明文接口, 保守间隔
    tencent_per_stock_sec: 0.5         # tencent em K线 逐只间隔; 来源: eastmoney CDN, 保守 (当前IP不可用)
    akshare_per_stock_sec: 1.5        # akshare 逐只间隔 (含换手率); 来源: 历史实测稳定值
    baostock_per_stock_sec: 0.3       # baostock 逐只间隔; 来源: 官方建议0.3s避免服务端断开, 实测稳定
    akshare_industry_sec: 0.8
  # ── 全量拉取源策略 (2026-07-20 TLS 指纹封禁根因分析) ──
  source_policy:
    # 多源回退优先级: tushare(批量50股) > tencent(em K线) > akshare(换手率) > sina > pytdx(TCP)
    # TLS 指纹对抗: tencent/akshare 连接 eastmoney CDN 使用 curl_cffi 模拟 Chrome 131
    #   来源: 2026-07-20 根因分析 — curl 通/Python requests 不通 = JA3 指纹检测, 非 IP 量级封禁
    #   eastmoney CDN 检测 Python ssl/OpenSSL 默认 TLS 指纹 → 直接断开连接 (RemoteDisconnected)
    full_universe_sources: [tushare, tencent, akshare, sina, pytdx]
    # 每日单源最大请求数 — 超出 → 停止并告警, 不等下次 cron 重试
    # 来源: tushare 免费额度 200次/分钟 ≈ 3000次/15分钟窗口
    max_requests_per_source_per_run: 500
    # curl_cffi TLS 指纹模拟目标; 来源: 实测 Chrome 131 可过 eastmoney CDN JA3 检测
    curl_impersonate: "chrome131"
  fetch:
    max_lookback_days: 2000
  http_timeout:
    sina: 10                 # 新浪行情 HTTP 超时 (秒)
    tushare: 10              # Tushare API HTTP 超时 (秒)
    tencent: 15              # 腾讯行情 API HTTP 超时 (秒)
    sse: 20                  # 上交所 SSE API HTTP 超时 (秒)
  pytdx:
    connect_timeout: 10       # pytdx 行情 TCP 连接超时 (秒)
    sse: 20                  # 上交所 SSE API HTTP 超时 (秒)
  api_delay:
    fund_hold: 2             # 基金持仓 API 限频间隔 (秒)
    margin: 4                # 融资融券 SSE API 限频间隔 (秒)
    margin_page: 5           # 融资融券翻页间隔 (秒)
    limit_up: 0.3            # 涨跌停 API 限频间隔 (秒)
    holder_trade: 0.3        # 股东交易 API 限频间隔 (秒)
    lhb: 0.5                 # 龙虎榜 API 限频间隔 (秒)
    jq_valuation: 0.15       # 聚宽估值 API 限频间隔 (秒)
    fund_flow: 5.0           # 资金流向 API 限频间隔 (秒)
    dividend: 0.2            # 分红 API 限频间隔 (秒)
    daily_basic: 0.1         # 基础日线 API 限频间隔 (秒)
    northbound: 0.3          # 北向资金 API 限频间隔 (秒)
  sqlite:
    timeout: 30              # SQLite 连接超时 (秒)
    busy_timeout: 30000      # SQLite 忙等待超时 (ms)
execution:
  commission: 0.0003
  min_commission: 5
  slippage: 0.001
  impact_eta: 0.1            # Almgren-Chriss 冲击模型 η; 来源: Almgren et al. (2005) 线性冲击
  default_daily_vol: 0.02    # 日波动率默认值; 来源: A股日波动率中位数 ~2%
  stamp_tax: 0.001
  quote:
    max_batch_workers: 4   # 新浪行情并行拉取最大线程数
  limit_order:
    discount_pct: 0.002       # 限价折扣: 挂单价 = 参考价 × (1 - discount)
    chase_threshold: 0.01     # 当前价 < 限价超过 1% → 追价下调限价
    runaway_threshold: 0.02   # 当前价 > 限价超过 2% → 放弃, 市价补买
    force_fill_time: "14:50"  # 尾盘强制补单时间; 来源: A股尾盘 14:50 流动性尚可, 15:00 收盘
    quote_ttl_sec: 30         # 行情陈旧阈值 (秒); 超过此值视为过期, 不触发事件
factor:
  accruals:
    max: 1
    min: -1
  amihud:
    min_valid_days: 30
    min_valid_ratio: 0.5
    scale: 1000000
  compute:
    zscore_min_count_dense: 30
    zscore_min_count_sparse: 10
  debt_ratio:
    max: 2
    min: 0
  decay_horizons:
  - 1
  - 5
  - 20
  enable_quality: false
  evaluation:
    backtest_start_date: '2010-01-01'
    cpcv_groups: 5
    cpcv_test_groups: 1
    embargo_days: 1
    lookback: 120
    max_workers: 4  # P78: M1 4P-core, ThreadPoolExecutor 最优线程数
    worker_timeout_sec: 300  # P78: ThreadPoolExecutor 5min timeout
    min_abs_ic: 0.02
    min_half_life: 20
    # -- ICIR 阈值 --
    # A股单因子 IC 中位数≈0.01-0.03, ICIR 到 0.2 就算好因子
    # 来源: Grinold & Kahn (1999) 美股 0.5→1.0; Qian/Hua/Sorensen (2007) 单因子 0.25-0.5
    #       国内平台(聚宽/米筐/BigQuant) A股 0.2-0.3; AQR Asness 全球 0.3
    min_icir: 0.25
    # -- monitoring 降级阈值 (Phase 2 不过但非完全无效的因子入 monitoring 池) --
    # 来源: 低于正式阈值但仍有微弱信号; 不对实盘开放但保留观察
    monitoring_min_icir: 0.15            # ICIR<0.15 → fail; 来源: 与 diagnostics 松阈值对齐
    monitoring_min_abs_ic: 0.01          # |IC|<0.01 → fail; 来源: 微弱但有方向性的信号下限
    # -- 退役重试上限 --
    max_retries: 3                      # retired 累计次数上限, 达此阈值 → rejected; 来源: 业界惯例 (WorldQuant 3次未过即永久淘汰)
    # ── 两步架构: 诊断快筛阈值 ──
    diagnostics_min_icir: 0.15            # ICIR<0.15 → drop; A股预筛松阈值, 保留微弱信号给 Phase 2 验证
    diagnostics_pnl_threshold: 0.1        # PnL>0.1 → boost; 来源: backtest/diagnostics.py diagnose()
    diagnostics_review_threshold: -0.5    # PnL<-0.5 → review; 来源: backtest/diagnostics.py diagnose()
    n_days: 120
    n_symbols: 800
    net_sharpe_min: 0.3
    pbo_max: 0.3
    sharpe_decay_max: 0.5
    t_threshold: 2.0
  high52w:
    clip_high: 2
    clip_low: -2
  idio_vol:
    min_common_obs: 10
  roe_ratio:
    max: 100
    min: 0
  roe_reported:
    max: 1
    min: -1
  stats:
    ic_min_periods: 20  # min trading days w/ valid IC (diff from min_obs=30: min stocks per cross-section)
    lookback_amplification: 1.5
    min_valid_days: 30
    snapshot_ttl_sec: 86400
  synth:
    zscore_clip: 3.0
  turnover_rev:
    fallback_count: 50
  windows:
    amihud: 250
    downside_volatility: 126
    idiosyncratic_vol: 126
    intraday_range: 20
    lhb_net_buy: 20
    max_return: 20
    skewness: 60
    volatility: 126
    volume_ratio_long: 20
    volume_ratio_short: 5
  board_limits:
    # A股各板块涨跌停幅度; 来源: 上交所/深交所/北交所交易规则
    main: 0.10          # 主板 (60xxxx, 00xxxx) ±10%
    main_st: 0.05       # 主板ST股 (60xxxx, 00xxxx, 含*ST) ±5%; 来源: 深交所/上交所特别处理规定
    chinext: 0.20       # 创业板 (30xxxx) ±20%
    star: 0.20          # 科创板 (68xxxx) ±20%
    beijing: 0.30       # 北交所 (8xxxxx, 9xxxxx) ±30%
  limit_detection_margin: 0.005  # 涨跌停检测容差; 来源: tick size 舍入可能导致收盘价略低于涨跌停线, 业界常用 0.5% (聚宽/米筐)
optimizer:
  method: equal_weight
  min_holding_days: 5
  rebalance_freq: weekly
  nano_cap: 30000          # 低于此资金: Nano 层 — 贪心等权, 集中持仓 (来源: docs/reports/capital-segmentation-analysis-2026-07-15.md)
  micro_cap: 100000        # 低于此资金: Micro 层 — 得分倾斜; 高于此: Small 层 — 均值-方差 (来源: docs/reports/capital-segmentation-analysis-2026-07-15.md)
  kelly_fraction: 4.0      # Fractional Kelly: 1=full, 2=half, 4=quarter (conservative). Source: Ralph Vince 1990
risk:
  default_stop_loss_pct: 0.05  # ATR 不可用时的默认止损比例; 来源: 行业惯例 5% 硬止损
  covariance:
    min_periods: 30
    window: 60
  covariance_method: ledoit_wolf
  covariance_window: 60
  exclude_markets:
  - BJ
  exclude_star_st: true
  max_positions: 20
  max_sector_exposure: 0.4
  max_single_position: 0.05
  min_daily_amount: 500000
  min_price: 2
  neutralize:
    min_common_stocks: 30
    min_stocks_per_industry: 3
  rolling_window: 60
  # ── ATR 动态止损止盈 (替代固定百分比) ──
  atr_period: 20
  atr_mult_stop_loss: 2.0          # 止损: 现价≤成本-2×ATR → 全卖
  # ── 固定百分比止损 (backup for non-ATR signals) ──
  stop_loss_pct: 0.08              # 浮亏≥8% → 强制止损; 来源: A股±10%跌停下, 15%来不及执行
  stop_loss_cooloff_days: 5       # 止损后 N 日内不再买入同一只股票; 来源: 防止 buy→止损→rebuy 螺旋
  atr_mult_take_profit_1: 2.0      # 止盈1: 现价≥成本+2×ATR → 卖50%
  atr_mult_take_profit_2: 3.0      # 止盈2: 现价≥成本+3×ATR → 卖剩余50%
  atr_mult_trailing: 1.5           # 移动锁利: 盈利超2ATR后回撤1.5ATR → 全卖
  max_hold_days: 20                # 时间止损: 持仓>20天+浮亏 → 全卖
screening:
  backtest_end: '2026-06-30'
  backtest_start: '2025-06-30'
  timeout: 600
monitor:
  telegram_bot_token: ""     # Telegram Bot Token (可选, 留空禁用)
  telegram_chat_id: ""       # Telegram Chat ID (可选)
  wechat_webhook: ""         # 企业微信 Webhook URL (可选)
  # ── P6: 盘中监控补充 ──
  max_single_concentration: 0.15    # 单票集中度上限 (仓位价值/总资产); 来源: 分散化要求, 不超过15%
  max_sector_concentration: 0.40    # 单行业集中度上限; 来源: 与 risk.max_sector_exposure 一致
  min_daily_turnover_amount: 30000000  # 流动性下限 (日均成交额); 来源: A股小票流动性阈值 3000万
  var_confidence: 0.95              # VaR 置信水平; 来源: 业界标准 95%
  max_trades_per_day: 50          # R2: 单日最大交易笔数; 来源: 小资金账户, 50笔以内
  max_daily_turnover_pct: 0.50    # R2: 单日最大换手率; 来源: >50%换手→成本侵蚀收益
  # ── R2: 交易频率/换手监控 ──
  alert:
    drawdown_critical: 0.20   # 累计回撤 ≥20% → critical 告警
    drawdown_warning: 0.10    # 累计回撤 ≥10% → warning 告警
quant:
  scheduler:
    poll_interval: 30         # 调度器轮询间隔 (秒), 业界标准 ≤60s
sync:
  daily_interval: 3           # 日线同步 API 间隔 (秒)
web:
  port: 8521
  sse:
    queue_timeout: 30         # SSE 事件队列超时 (秒)

live:
  default_capital: 5000    # 实盘默认本金; 来源: 策略首次启动时自动写入 DB 的种子资金

# ── Universe 股票池过滤 (对齐业界标准: 聚宽/米筐/BigQuant/QuantConnect) ──
# 实盘信号生成: SQL 层过滤, 从源头排除不合格股票
# 回测: apply_all_filters() 以当日数据点对点过滤, 避免 survivorship bias
universe:
  # ST/*ST 排除; 来源: 聚宽/米筐/BigQuant 默认排除 (A股退市风险, 涨跌幅仅±5%)
  exclude_st: true
  # 新股排除 (上市不足N天); 来源: 聚宽60天(默认), 米筐90天, BigQuant120天
  # 新股上市初期换手率极高/连板频繁 → 量价信号失真
  exclude_new_stock_days: 60
  # 最低股价(元); 来源: 面值退市¥1 + 1元安全边际, BigQuant 标准
  min_price: 2.0
  # 最低日成交额(元); 来源: A股中小盘盘口实测(500万以下无法有效进出), BigQuant 标准
  min_daily_amount: 500000
  # 连续N天换手率=0排除; 来源: QuantConnect/聚宽默认排除停牌股, 僵尸股无流动性
  exclude_zero_turnover_days: 0  # 临时关闭 — 2026-07-21: sina/tickflow 均无 turnover 字段, tushare daily_basic 限1次/分钟无法批量回填。待找到批量 turnover 源后回填并改回 5
