<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>仓位算法竞技场 · ¥5000→¥100万</title>
<link rel="stylesheet" href="/static/style.css?v=20">
</head><body>
<div id="app">
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <a href="/" style="color:var(--muted)">陈小群</a>
    <a href="/etf" style="color:var(--muted)">ETF轮动</a>
    <a href="/smallcap" style="color:var(--muted)">小市值</a>
    <a href="/timing" style="color:var(--muted)">大盘择时</a>
    <b>🏟️ 竞技场</b>
  </div>

  <div style="font-size:12px;color:var(--muted);margin-bottom:12px">
    同一陈小群信号源, 5个独立仓位算法, 各¥5,000, 各自决策<br>
    全Kelly=Kelly 1956 | 半Kelly=Chan第6章 | 威尔逊=Wilson 1927 | 固定比率=Ryan Jones
  </div>

  <div class="section-title">📊 仓位算法对比</div>
  <div id="comparison-table"></div>

  <div class="section-title">💼 持仓明细</div>
  <div id="position-list"></div>

  <div class="section-title">📋 最近交易</div>
  <div id="trade-list"></div>
</div>

<script>
var SIZERS = ["chen","chen_fullkelly","chen_halfkelly","chen_wilson","chen_fixedratio"];
var LABELS = {"chen":"⭐实盘","chen_fullkelly":"全Kelly","chen_halfkelly":"半Kelly","chen_wilson":"威尔逊","chen_fixedratio":"固定比率"};

async function poll() {
  var rows = [];
  for (var s of SIZERS) {
    try {
      var p = await (await fetch('/api/performance?strategy='+s)).json();
      var kf = null, dd = null;
      try { var ir = await (await fetch('/api/performance/icir?strategy='+s)).json();
            kf = ir.ir_implied; dd = ir.risk_alerts; } catch(e) {}
      rows.push({
        name: LABELS[s], strategy: s,
        total_asset: (5000 + (p.total_pnl||0)),
        capital: p.capital||0,
        return_pct: (((5000 + (p.total_pnl||0))/5000 - 1)*100),
        realized: p.realized_pnl||0,
        buys: p.total_buys||0, sells: p.total_sells||0, win_rate: p.win_rate||0,
        kelly_f: p.kelly_f || kf, drawdown: dd
      });
    } catch(e) { rows.push({name:LABELS[s],strategy:s,error:1}); }
  }
  render(rows);
}

function render(rows) {
  var maxAsset = Math.max.apply(null, rows.map(function(r){return r.total_asset||5000;}));
  var html = '<table class="pos-table"><thead><tr>'+
    '<th>算法</th><th>💰总资产</th><th>💵可用</th><th>📈收益</th><th>已实现</th><th>交易</th><th>胜率</th><th>⚡Kelly</th><th>⚠️</th>'+
    '</tr></thead><tbody>';

  rows.forEach(function(r){
    if (r.error) { html += '<tr><td>'+r.name+'</td><td colspan="8" class="empty">数据不足</td></tr>'; return; }
    var cls = r.return_pct>=0?'up':'down';
    var clsW = r.win_rate>=50?'up':'down';
    var dd = r.drawdown || {};
    var risk = '';
    if (dd&&dd.drawdown_warning) risk += '⚠️回撤 ';
    if (dd&&dd.model_breakdown) risk += '⚠️模型 ';
    if (!risk) risk = '✓';

    html += '<tr>'+
      '<td><b>'+r.name+'</b></td>'+
      '<td style="'+(r.total_asset==maxAsset?'color:var(--up);font-weight:bold':'')+'">¥'+r.total_asset.toLocaleString()+'</td>'+
      '<td>¥'+r.capital.toLocaleString()+'</td>'+
      '<td class="'+cls+'">'+(r.return_pct>=0?'+':'')+r.return_pct.toFixed(2)+'%</td>'+
      '<td class="'+cls+'">'+(r.realized>=0?'+':'')+'¥'+r.realized.toLocaleString()+'</td>'+
      '<td>'+r.buys+'买'+r.sells+'卖</td>'+
      '<td class="'+clsW+'">'+r.win_rate+'%</td>'+
      '<td>'+(r.kelly_f!=null?r.kelly_f.toFixed(3):'N/A')+'</td>'+
      '<td>'+risk+'</td></tr>';
  });
  html += '</tbody></table>';
  html += '<div class="icir-footnote">来源: Kelly 1956 / Chan 第6章 / Wilson 1927 / Ryan Jones. 所有sizer独立运行, 互不干扰.</div>';
  document.getElementById('comparison-table').innerHTML = html;
}

async function renderPositions() {
  var all = [];
  for (var s of SIZERS) {
    try {
      var td = await (await fetch('/api/trades?strategy='+s)).json();
      (td.positions||[]).forEach(function(p){ p._strat = s; all.push(p); });
    } catch(e) {}
  }
  var list = document.getElementById('position-list');
  if (!all.length) { list.innerHTML = '<div class="empty">全部空仓</div>'; return; }
  list.innerHTML = '<table class="pos-table"><thead><tr><th>算法</th><th>代码</th><th>数量</th><th>成本</th><th>现价</th><th>盈亏</th><th>市值</th></tr></thead><tbody>'+
    all.map(function(p){
      var cost = p.price||0, shares = p.shares||0;
      var cur = p.current||cost, val = shares * cur;
      var pnl = ((cur/cost - 1)*100)||0;
      var cls = pnl>=0?'up':'down';
      return '<tr><td><span style="font-size:10px;color:var(--muted)">'+LABELS[p._strat]+'</span></td>'+
        '<td>'+p.symbol+'</td><td>'+shares+'股</td><td>¥'+cost.toFixed(2)+'</td>'+
        '<td>¥'+cur.toFixed(2)+'</td><td class=\"'+cls+'\">'+(pnl>=0?'+':'')+pnl.toFixed(1)+'%</td>'+
        '<td>¥'+val.toLocaleString()+'</td></tr>';
    }).join('')+'</tbody></table>';
}

async function renderTrades() {
  var all = [];
  for (var s of SIZERS) {
    try {
      var td = await (await fetch('/api/trades?strategy='+s)).json();
      (td.trades||[]).forEach(function(t){ t._strat = s; all.push(t); });
    } catch(e) {}
  }
  all.sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });
  var list = all.slice(0, 20);
  document.getElementById('trade-list').innerHTML = list.length ? list.map(function(t){
    return '<div class="trade-row '+t.side+'">'+
      '<span style="font-size:10px;color:var(--muted)">['+LABELS[t._strat]+']</span> '+
      (t.side=='buy'?'🟢':'🔴')+' '+t.date+' '+t.symbol+' '+
      (t.side=='buy'?'买入':'卖出')+' ¥'+t.price.toFixed(2)+' ×'+t.shares+'股'+
      (t.pnl?' PnL ¥'+(t.pnl>=0?'+':'')+t.pnl:'')+'</div>';
  }).join('') : '<div class="empty">暂无交易</div>';
}

poll(); setInterval(poll, 30000);
renderPositions(); setInterval(renderPositions, 30000);
renderTrades(); setInterval(renderTrades, 15000);
</script>
</body></html>
