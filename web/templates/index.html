<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QuantA · 智能选股</title>
<style>
/* ── Bloomberg-inspired Dark Theme ── */
:root{
  --bg:         #000000;
  --bg-panel:   #121212;
  --bg-elevate: #1c1c1c;
  --bg-hover:   #242424;
  --border:     #2a2a2a;
  --border2:    #3a3a3a;
  --text:       #e6e6e6;
  --text-dim:   #999999;
  --text-mute:  #666666;
  --amber:      #f5a623; --amber-dim: rgba(245,166,35,0.10);
  --blue:       #4da6ff; --blue-dim:  rgba(77,166,255,0.10);
  --green:      #22c55e; --green-dim: rgba(34,197,94,0.10);
  --red:        #ef4444; --red-dim:   rgba(239,68,68,0.10);
  --white:      #ffffff;
  --font:       -apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  --mono:       'SF Mono','Cascadia Code','Menlo','Consolas',monospace;
  --side:       200px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;line-height:1.4;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── Sidebar ── */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--side);background:var(--bg-panel);border-right:1px solid var(--border);z-index:100;display:flex;flex-direction:column}
.sidebar .hd{padding:22px 20px 18px;border-bottom:1px solid var(--border)}
.sidebar .hd .logo{font-size:18px;font-weight:800;color:var(--amber);letter-spacing:0.5px}
.sidebar .hd .logo span{display:block;font-size:10px;font-weight:400;color:var(--text-mute);margin-top:2px;letter-spacing:1.5px}
.sidebar .nav{flex:1;padding:6px 10px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;color:var(--text-dim);font-size:12px;font-weight:500;border-radius:4px;cursor:pointer;transition:all .12s;margin-bottom:1px;letter-spacing:0.3px}
.nav-item:hover{color:var(--text);background:var(--bg-hover)}
.nav-item.on{color:var(--amber);background:var(--amber-dim)}
.nav-item .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.nav-item.on .dot{background:var(--amber)}
.nav-item .dot.dim{background:var(--border2)}
.sidebar .ft{padding:12px 16px;border-top:1px solid var(--border);font-size:10px;color:var(--text-mute);display:flex;align-items:center;gap:6px}
.sidebar .ft .live{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Main ── */
.main{margin-left:var(--side);padding:28px 32px 40px}
.topbar{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px}
.topbar .title{font-size:18px;font-weight:700;color:var(--white);letter-spacing:0.3px}
.topbar .meta{font-size:11px;color:var(--text-mute);font-family:var(--mono)}
.alert-bar{display:none;align-items:center;gap:8px;padding:8px 14px;margin-bottom:14px;border-radius:3px;background:var(--amber-dim);border-left:3px solid var(--amber)}
.alert-bar.show{display:flex}
.alert-bar .msg{color:var(--amber);font-weight:600;font-size:12px;font-family:var(--mono)}

/* ── KPI ── */
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:18px}
.kpi-card{background:var(--bg-panel);border:1px solid var(--border);border-radius:4px;padding:12px 14px;transition:border-color .15s}
.kpi-card:hover{border-color:var(--border2)}
.kpi-card .lbl{font-size:9px;color:var(--text-mute);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600}
.kpi-card .val{font-size:20px;font-weight:700;font-family:var(--mono);display:flex;align-items:baseline;gap:5px}
.kpi-card .sub{font-size:9px;color:var(--text-mute);margin-top:4px;font-family:var(--mono)}
.up{color:var(--red)}.down{color:var(--green)}.acc{color:var(--amber)}.blu{color:var(--blue)}

/* ── Pages ── */
.page{display:none}.page.on{display:block}

/* ── Cards ── */
.card{background:var(--bg-panel);border:1px solid var(--border);border-radius:4px;margin-bottom:14px;overflow:hidden}
.card-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;font-size:11px;font-weight:600;color:var(--text-dim);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:0.8px}
.card-hd .sub{font-weight:400;font-size:9px;color:var(--text-mute);text-transform:none;letter-spacing:0}
.card-body{padding:0}.card-body.pad{padding:10px 14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* ── Tables ── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:9px;color:var(--text-mute);font-weight:600;text-transform:uppercase;letter-spacing:0.6px;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;transition:color .12s}
.tbl th:hover{color:var(--text-dim)}
.tbl th.srt{color:var(--amber)}
.tbl td{font-size:12px;padding:7px 10px;border-bottom:1px solid var(--border);font-family:var(--mono)}
.tbl td.name{font-family:var(--font);font-size:12px}
.tbl tr:nth-child(even) td{background:rgba(255,255,255,0.008)}
.tbl tr:hover td{background:var(--bg-hover)}
.tbl .num{text-align:right}
.tbl .sym{font-weight:600}

/* ── Badges ── */
.badge{display:inline-block;font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px}
.badge-buy{background:var(--red-dim);color:var(--red)}.badge-sell{background:var(--green-dim);color:var(--green)}
.badge-rank{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:3px;font-size:10px;font-weight:700;background:var(--bg-elevate);color:var(--text-dim)}
.badge-rank.gold{background:var(--amber-dim);color:var(--amber)}

/* ── Sparkline ── */
.spark-wrap{width:60px;height:20px}

/* ── Factor ── */
.fac-item{display:flex;align-items:center;gap:8px;padding:3px 0}
.fac-name{font-size:10px;color:var(--text-dim);width:130px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono)}
.fac-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.fac-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--amber),var(--blue));transition:width .4s}
.fac-num{font-size:9px;font-family:var(--mono);width:44px;text-align:right;color:var(--text-dim)}

/* ── Portfolio ── */
.port-summary{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
.port-card{background:var(--bg-panel);border:1px solid var(--border);border-radius:4px;padding:12px;text-align:center}
.port-card:hover{border-color:var(--border2)}
.port-card .lbl{font-size:9px;color:var(--text-mute);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px}
.port-card .val{font-size:17px;font-weight:700;font-family:var(--mono)}

/* ── Empty ── */
.empty{display:flex;flex-direction:column;align-items:center;padding:36px;color:var(--text-mute);font-size:12px;font-family:var(--mono)}
.empty .icon{font-size:24px;margin-bottom:6px;opacity:.4}

/* ── Metric groups ── */
.metric-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:11px;border-bottom:1px solid var(--border)}
.metric-row .l{color:var(--text-dim)}
.metric-row .r{font-family:var(--mono);font-weight:600}

/* ── Responsive ── */
@media(max-width:1200px){.kpi-row{grid-template-columns:repeat(3,1fr)}.grid-2{grid-template-columns:1fr}.port-summary{grid-template-columns:repeat(3,1fr)}}
</style></head><body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="hd"><div class="logo">QUANTA<span>SMART STOCK SELECTOR</span></div></div>
  <nav class="nav">
    <div class="nav-item on" onclick="switchPage('picks')"><span class="dot"></span>选股推荐</div>
    <div class="nav-item" onclick="switchPage('tracking')"><span class="dot dim"></span>追踪回顾</div>
    <div class="nav-item" onclick="switchPage('positions')"><span class="dot dim"></span>持仓监控</div>
    <div class="nav-item" onclick="switchPage('trades')"><span class="dot dim"></span>交易记录</div>
  </nav>
  <div class="ft"><span class="live"></span><span id="statusText">SYSTEM ONLINE</span></div>
</aside>

<!-- Main Content -->
<main class="main">
  <div class="topbar"><div class="title" id="pageTitle">选股推荐</div><div class="meta" id="headerMeta">WAITING FOR DATA...</div></div>
  <div class="alert-bar" id="alertBar"><span class="msg" id="alertMsg"></span></div>

  <!-- ═══ PAGE 1: 选股推荐 ═══ -->
  <div class="page on" id="page-picks">
    <div class="kpi-row" id="kpiBar"></div>
    <div class="grid-2">
      <div class="card">
        <div class="card-hd">推荐组合<span class="sub" id="recBadge">TOP 3</span></div>
        <div class="card-body"><table class="tbl" id="recTable"><thead><tr><th>#</th><th>趋势</th><th onclick="sortTbl('recTable',3)">代码 ▴</th><th>名称</th><th class="num" onclick="sortTbl('recTable',5)">得分 ▴</th><th class="num" onclick="sortTbl('recTable',6)">现价 ▴</th><th class="num" onclick="sortTbl('recTable',7)">5D ▴</th><th class="num">波动</th></tr></thead><tbody></tbody></table></div>
      </div>
      <div class="card">
        <div class="card-hd">追踪回顾<span class="sub" id="trackBadgeR">—</span></div>
        <div class="card-body" id="trackPanelR"><div class="empty"><div class="icon">○</div>暂无回顾数据<br><span style="font-size:10px;color:var(--text-mute)">新推荐发布后自动追踪</span></div></div>
      </div>
    </div>
    <div class="grid-2">
      <div class="card"><div class="card-hd">回测指标</div><div class="card-body pad" id="backtestPanel"></div></div>
      <div class="card"><div class="card-hd">因子重要性<span class="sub" id="factorBadge">—</span></div><div class="card-body pad" id="factorPanel"></div></div>
    </div>
  </div>

  <!-- ═══ PAGE 2: 追踪回顾 ═══ -->
  <div class="page" id="page-tracking">
    <div class="kpi-row" id="trackKpi"></div>
    <div class="card"><div class="card-hd">历史追踪<span class="sub" id="trackCount">0</span></div><div class="card-body"><table class="tbl" id="trackHistoryTable"><thead><tr><th>推荐日</th><th>追踪日</th><th class="num">数</th><th class="num">命中</th><th class="num">均收</th><th class="num">相关</th><th>明细</th></tr></thead><tbody></tbody></table></div></div>
  </div>

  <!-- ═══ PAGE 3: 持仓监控 ═══ -->
  <div class="page" id="page-positions">
    <div class="port-summary" id="portSummary"></div>
    <div class="card"><div class="card-hd">当前持仓<span class="sub" id="posCount">0</span></div><div class="card-body"><table class="tbl" id="posTable"><thead><tr><th>代码</th><th>名称</th><th class="num">股数</th><th class="num">成本</th><th class="num">现价</th><th class="num">市值</th><th class="num" onclick="sortTbl('posTable',7)">盈亏 ▴</th><th>买入日</th></tr></thead><tbody></tbody></table></div></div>
  </div>

  <!-- ═══ PAGE 4: 交易记录 ═══ -->
  <div class="page" id="page-trades">
    <div class="card"><div class="card-hd">交易记录<span class="sub">RECOMMEND → BUY</span></div><div class="card-body"><table class="tbl" id="tradeTable"><thead><tr><th>日期</th><th>代码</th><th>名称</th><th>方向</th><th class="num">股数</th><th class="num">价格</th><th class="num">金额</th><th class="num">费用</th></tr></thead><tbody></tbody></table></div></div>
  </div>
</main>

<script>
// ── State ──
var DATA=null,TRACK_DATA=null,prevMetrics=null,prevPortValue=null;

// ── Navigation ──
function switchPage(n){
  document.querySelectorAll('.nav-item').forEach(function(e,i){
    e.classList.remove('on');
    var d=e.querySelector('.dot');
    d.classList.remove('dim');
    if(n!==e.getAttribute('onclick').match(/'(\w+)'/)[1])d.classList.add('dim');
  });
  var it=document.querySelector('.nav-item[onclick*="'+n+'"]');
  it.classList.add('on');it.querySelector('.dot').classList.remove('dim');
  document.querySelectorAll('.page').forEach(function(e){e.classList.remove('on')});
  document.getElementById('page-'+n).classList.add('on');
  var t={picks:'选股推荐',tracking:'追踪回顾',positions:'持仓监控',trades:'交易记录'};
  document.getElementById('pageTitle').textContent=t[n];
  if(n==='tracking')loadTracking();
  if(n==='positions')loadPositions();
  if(n==='trades')loadTrades();
}

// ── Sort ──
function sortTbl(id,c){
  var t=document.getElementById(id),rows=Array.from(t.querySelectorAll('tbody tr'));
  if(!rows.length)return;
  var th=t.querySelectorAll('th')[c],asc=!th.classList.contains('srt');
  t.querySelectorAll('th').forEach(function(h){h.classList.remove('srt')});
  th.classList.add('srt');
  rows.sort(function(a,b){
    var x=(a.cells[c]||{}).textContent||'',y=(b.cells[c]||{}).textContent||'';
    var nx=parseFloat(x.replace(/[^0-9.\-+]/g,'')),ny=parseFloat(y.replace(/[^0-9.\-+]/g,''));
    if(!isNaN(nx)&&!isNaN(ny))return asc?nx-ny:ny-nx;
    return asc?x.localeCompare(y):y.localeCompare(x);
  });
  rows.forEach(function(r){t.querySelector('tbody').appendChild(r)});
}

// ── Sparkline ──
function spark(v){
  if(!v||v.length<2)return'';
  var mn=v[0],mx=v[0];
  for(var i=1;i<v.length;i++){if(v[i]<mn)mn=v[i];if(v[i]>mx)mx=v[i];}
  var r=mx-mn||1,w=60,h=20,p='';
  for(i=0;i<v.length;i++)p+=(i/(v.length-1)*w).toFixed(1)+','+(h-((v[i]-mn)/r)*(h-4)-2).toFixed(1)+' ';
  return'<svg class="spark-wrap" viewBox="0 0 '+w+' '+h+'"><polyline fill="none" stroke="'+(v[v.length-1]>=v[0]?'#ef4444':'#22c55e')+'" stroke-width="1.3" points="'+p+'"/></svg>';
}

// ── Trend arrow ──
function tnd(cur,prev){
  if(prev===null||prev===undefined||prev===0)return'';
  var d=(cur-prev)/Math.abs(prev||1);
  if(Math.abs(d)<0.005)return'<span style="color:var(--text-mute);font-size:10px"> →</span>';
  return d>0?'<span style="color:var(--red);font-size:10px"> ▲</span>':'<span style="color:var(--green);font-size:10px"> ▼</span>';
}

// ── Picks page ──
function renderAll(d){
  DATA=d;var m=d.metrics||{};
  var sh=m.sharpe_ratio||0,ar=(m.annual_return||0)*100,dd=(m.max_drawdown||0)*100,wr=(m.win_rate||0)*100;
  var pv=prevMetrics;
  document.getElementById('kpiBar').innerHTML=
    '<div class="kpi-card"><div class="lbl">Sharpe Ratio</div><div class="val '+(sh>=0?'up':'down')+'">'+sh.toFixed(3)+(pv?tnd(sh,pv.sharpe_ratio):'')+'</div></div>'+
    '<div class="kpi-card"><div class="lbl">Annual Return</div><div class="val '+(ar>=0?'up':'down')+'">'+(ar>=0?'+':'')+ar.toFixed(1)+'%'+(pv?tnd(ar,pv.annual_return*100):'')+'</div></div>'+
    '<div class="kpi-card"><div class="lbl">Max Drawdown</div><div class="val down">'+dd.toFixed(1)+'%</div><div class="sub">'+d.data_range+'</div></div>'+
    '<div class="kpi-card"><div class="lbl">Win Rate</div><div class="val">'+wr.toFixed(1)+'%</div></div>'+
    '<div class="kpi-card"><div class="lbl">Factors</div><div class="val acc">'+(d.n_passed||0)+'</div><div class="sub">'+(d.n_all_factors||0)+' → '+(d.n_passed||0)+'</div></div>'+
    '<div class="kpi-card"><div class="lbl">Ensemble</div><div class="val" style="font-size:10px;font-family:var(--font)">'+(d.model_info||'')+'</div></div>';
  prevMetrics={sharpe_ratio:sh,annual_return:m.annual_return||0};
  renderTable();
  if(TRACK_DATA)renderTrack();

  var bl={total_return:'Total Return',annual_return:'Annual Return',annual_volatility:'Volatility',sharpe_ratio:'Sharpe Ratio',max_drawdown:'Max Drawdown',win_rate:'Win Rate',calmar_ratio:'Calmar Ratio',information_ratio:'Info Ratio',alpha:'Alpha',beta:'Beta'};
  var bh='';
  for(var k in bl){if(m[k]!==undefined){var v=m[k],pct=['total_return','annual_return','max_drawdown','win_rate'].indexOf(k)>=0;
    bh+='<div class="metric-row"><span class="l">'+bl[k]+'</span><span class="r">'+(pct?(v>=0?'+':'')+(v*100).toFixed(2)+'%':v.toFixed(3))+'</span></div>';
  }}
  if(d.benchmark){var bm=d.benchmark;
    bh+='<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:9px;color:var(--text-mute);letter-spacing:1px;margin-bottom:4px">BENCHMARK '+bm.code+'</div>';
    [{k:'benchmark_return',l:'Benchmark Return'},{k:'benchmark_sharpe',l:'Benchmark Sharpe'},{k:'alpha',l:'Alpha'},{k:'excess_sharpe',l:'Excess Sharpe'}].forEach(function(x){
      if(bm[x.k]!==undefined){var v=bm[x.k];bh+='<div class="metric-row"><span class="l">'+x.l+'</span><span class="r">'+(x.k.indexOf('return')>=0?(v>=0?'+':'')+(v*100).toFixed(2)+'%':v.toFixed(3))+'</span></div>';}
    });
  }
  document.getElementById('backtestPanel').innerHTML=bh;

  var facts=d.top_factors||{},ents=Object.entries(facts).sort(function(a,b){return b[1]-a[1]}).slice(0,10);
  var mx=ents[0]?ents[0][1]:1;
  document.getElementById('factorPanel').innerHTML=ents.length?ents.map(function(e){
    return'<div class="fac-item"><span class="fac-name">'+e[0]+'</span><div class="fac-track"><div class="fac-fill" style="width:'+Math.max(2,(e[1]/mx*100).toFixed(0))+'%"></div></div><span class="fac-num">'+e[1].toFixed(3)+'</span></div>';
  }).join(''):'<div class="empty">暂无因子数据</div>';
  document.getElementById('factorBadge').textContent=(d.n_all_factors||'?')+' → '+(d.n_passed||'?');
}

function renderTable(){
  if(!DATA||!DATA.recommendations)return;
  var recs=DATA.recommendations;
  document.getElementById('recBadge').textContent='TOP '+recs.length;
  document.getElementById('recTable').querySelector('tbody').innerHTML=recs.map(function(r,i){
    return'<tr><td><span class="badge-rank'+(i===0?' gold':'')+'">'+(i+1)+'</span></td><td>'+(r.sparkline&&r.sparkline.length>1?spark(r.sparkline):'<span style="color:var(--text-mute);font-size:10px">—</span>')+'</td><td class="sym">'+r.symbol+'</td><td class="name">'+(r.name||'')+'</td><td class="num" style="color:var(--amber)">'+r.score.toFixed(4)+'</td><td class="num sym">'+(r.last_price||0).toFixed(2)+'</td><td class="num '+(r.change_5d>=0?'up':'down')+'">'+(r.change_5d>=0?'+':'')+(r.change_5d||0).toFixed(1)+'%</td><td class="num" style="font-size:10px;color:var(--text-dim)">'+(r.volatility||0).toFixed(1)+'%</td></tr>';
  }).join('');
}

// ── Track widget ──
function renderTrack(){
  if(!TRACK_DATA||!TRACK_DATA.tracked)return;
  var n=(DATA&&DATA.recommendations)?DATA.recommendations.length:0;
  var h='<table class="tbl"><thead><tr><th>代码</th><th>名称</th><th class="num">推荐价</th><th class="num">最新价</th><th class="num">涨跌</th></tr></thead><tbody>';
  for(var i=0;i<n;i++){
    if(i<TRACK_DATA.tracked.length){var t=TRACK_DATA.tracked[i];h+='<tr><td class="sym">'+t.symbol+'</td><td class="name">'+t.name+'</td><td class="num sym">'+t.rec_price.toFixed(2)+'</td><td class="num sym">'+t.latest_price.toFixed(2)+'</td><td class="num '+(t.change_pct>=0?'up':'down')+'">'+(t.change_pct>=0?'+':'')+t.change_pct.toFixed(2)+'%</td></tr>';}
  }
  h+='</tbody></table>';
  document.getElementById('trackPanelR').innerHTML=h;
  document.getElementById('trackBadgeR').textContent='AVG '+TRACK_DATA.avg_change.toFixed(2)+'%';
}
function loadTrack(){fetch('/api/track').then(function(r){return r.json()}).then(function(d){if(d.ok&&d.tracked){TRACK_DATA=d;renderTrack();}});}

// ── Tracking page ──
function loadTracking(){
  fetch('/api/tracking').then(function(r){return r.json()}).then(function(d){
    if(!d.ok){document.getElementById('trackHistoryTable').querySelector('tbody').innerHTML='<tr><td colspan="7"><div class="empty"><div class="icon">○</div>暂无追踪数据<br><span style="font-size:10px;color:var(--text-mute)">每日分析完成后自动追踪</span></div></td></tr>';return;}
    var s=d.stats||{},h=d.history||[];
    document.getElementById('trackCount').textContent=h.length+' records';
    document.getElementById('trackKpi').innerHTML=
      '<div class="kpi-card"><div class="lbl">Total Tracked</div><div class="val acc">'+s.total_tracked+'</div><div class="sub">stocks</div></div>'+
      '<div class="kpi-card"><div class="lbl">Hit Rate</div><div class="val '+(s.hit_rate>=50?'up':'down')+'">'+s.hit_rate+'%</div></div>'+
      '<div class="kpi-card"><div class="lbl">Avg Return</div><div class="val '+(s.avg_return>=0?'up':'down')+'">'+(s.avg_return>=0?'+':'')+s.avg_return+'%</div></div>'+
      '<div class="kpi-card"><div class="lbl">Avg Excess</div><div class="val '+(s.avg_excess>=0?'up':'down')+'">'+(s.avg_excess>=0?'+':'')+s.avg_excess+'%</div></div>'+
      '<div class="kpi-card"><div class="lbl">Limit-Up Hits</div><div class="val up">'+s.limit_up_hits+'</div><div class="sub">stocks</div></div>'+
      '<div class="kpi-card"><div class="lbl">#1 vs #2-3</div><div class="val" style="font-size:14px"><span style="color:var(--amber)">'+s.high_score_avg_return+'%</span> / '+s.mid_score_avg_return+'%</div></div>';
    document.getElementById('trackHistoryTable').querySelector('tbody').innerHTML=h.map(function(t){
      var det='';
      (t.details||[]).forEach(function(d){var c=d.change_pct;det+=d.symbol+'<span style="color:'+(c>=0?'var(--red)':'var(--green)')+'"> '+(c>=0?'+':'')+c+'%</span> ';});
      return'<tr><td class="sym">'+t.rec_date+'</td><td class="sym">'+t.track_date+'</td><td class="num">'+t.n_picks+'</td><td class="num">'+t.hit_rate+'%</td><td class="num '+(t.avg_return>=0?'up':'down')+'">'+(t.avg_return>=0?'+':'')+t.avg_return+'%</td><td class="num">'+(t.score_corr!=null?t.score_corr.toFixed(3):'—')+'</td><td style="font-size:10px;color:var(--text-dim);line-height:1.8">'+det+'</td></tr>';
    }).join('');
  });
}

// ── Positions page ──
function loadPositions(){
  fetch('/api/positions').then(function(r){return r.json()}).then(function(d){
    if(!d.ok)return;
    var s=d.summary||{},pos=d.positions||[];
    document.getElementById('posCount').textContent=s.n_positions+' positions';
    document.getElementById('portSummary').innerHTML=
      '<div class="port-card"><div class="lbl">Invested</div><div class="val">¥'+(s.total_invested||0).toFixed(0)+'</div></div>'+
      '<div class="port-card"><div class="lbl">Market Value</div><div class="val">¥'+(s.current_value||0).toFixed(0)+'</div></div>'+
      '<div class="port-card"><div class="lbl">P&L</div><div class="val '+(s.total_pnl>=0?'up':'down')+'">'+(s.total_pnl>=0?'+':'')+'¥'+(s.total_pnl||0).toFixed(0)+(prevPortValue!==null?tnd(s.current_value,prevPortValue):'')+'</div></div>'+
      '<div class="port-card"><div class="lbl">Return</div><div class="val '+(s.total_pnl_pct>=0?'up':'down')+'">'+(s.total_pnl_pct>=0?'+':'')+(s.total_pnl_pct||0).toFixed(1)+'%</div></div>'+
      '<div class="port-card"><div class="lbl">Cash</div><div class="val">¥'+(s.cash_remaining||0).toFixed(0)+'</div></div>';
    prevPortValue=s.current_value;
    document.getElementById('posTable').querySelector('tbody').innerHTML=pos.length?pos.map(function(p){
      return'<tr><td class="sym">'+p.symbol+'</td><td class="name">'+p.name+'</td><td class="num">'+p.shares+'</td><td class="num">¥'+p.cost_price.toFixed(2)+'</td><td class="num">¥'+(p.latest_price||0).toFixed(2)+'</td><td class="num">¥'+(p.current_value||0).toFixed(0)+'</td><td class="num '+(p.pnl>=0?'up':'down')+'"><b>'+(p.pnl>=0?'+':'')+'¥'+p.pnl.toFixed(0)+'</b><br><small>'+(p.pnl_pct>=0?'+':'')+p.pnl_pct.toFixed(1)+'%</small></td><td class="sym">'+p.buy_date+'</td></tr>';
    }).join(''):'<tr><td colspan="8"><div class="empty"><div class="icon">○</div>暂无持仓<br><span style="font-size:10px;color:var(--text-mute)">推荐发布后自动模拟买入</span></div></td></tr>';
  });
}

// ── Trades page ──
function loadTrades(){
  fetch('/api/trades').then(function(r){return r.json()}).then(function(d){
    if(!d.ok)return;
    var trades=d.trades||[];
    document.getElementById('tradeTable').querySelector('tbody').innerHTML=trades.length?trades.map(function(t){
      return'<tr><td class="sym">'+t.trade_date+'</td><td class="sym">'+t.symbol+'</td><td class="name">'+t.name+'</td><td><span class="badge badge-'+(t.side==='buy'?'buy':'sell')+'">'+(t.side==='buy'?'BUY':'SELL')+'</span></td><td class="num">'+t.shares+'</td><td class="num">¥'+t.price.toFixed(2)+'</td><td class="num">¥'+t.cost.toFixed(0)+'</td><td class="num">¥'+t.commission.toFixed(1)+'</td></tr>';
    }).join(''):'<tr><td colspan="8"><div class="empty"><div class="icon">○</div>暂无交易<br><span style="font-size:10px;color:var(--text-mute)">推荐发布后自动模拟买入</span></div></td></tr>';
  });
}

// ── Init ──
fetch('/api/latest').then(function(r){return r.json()}).then(function(d){
  document.getElementById('headerMeta').textContent=d.ok&&d.raw_json?'LAST UPDATE '+d.run_at.replace('T',' ').substring(5,16)+' · 08:00 / 16:00 AUTO':'WAITING FOR FIRST ANALYSIS';
  if(d.ok&&d.raw_json)try{renderAll(JSON.parse(d.raw_json));}catch(e){console.error(e);}
});
fetch('/api/auto-status').then(function(r){return r.json()}).then(function(d){
  document.getElementById('statusText').textContent=d.status==='success'?'SYSTEM ONLINE':'SYSTEM OFFLINE';
  if(d.alerts&&d.alerts.length){document.getElementById('alertBar').classList.add('show');document.getElementById('alertMsg').textContent=d.alerts[0].msg;}
});
loadTrack();setInterval(loadTrack,30000);
</script></body></html>
