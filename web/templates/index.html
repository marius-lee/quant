<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>北极星 · ¥5000→¥100万</title>
<link rel="stylesheet" href="/static/style.css?v=10">
</head><body>

<div id="app">
  <!-- 本金 -->
  <div id="capital-bar">
    <span>💰</span>
    <span id="capital-amount">¥5,000</span>
    <span id="capital-return"></span>
  </div>

  <!-- 情绪 + 状态 -->
  <div id="mood-bar">
    <span id="mood-icon">⏳</span>
    <span id="mood-label">等待开盘</span>
    <span id="mood-position"></span>
    <span id="status-dot" style="margin-left:auto"></span>
  </div>

  <!-- 两栏: 持仓(left) + 交易(right) -->
  <div id="dual-panel">
    <!-- 持仓 (有持仓时显示) -->
    <div id="positions-panel">
      <div class="section-title">💼 持仓 <span id="pos-count"></span></div>
      <div id="position-list"></div>
      <div id="exit-alerts"></div>
    </div>

    <!-- 最近交易 -->
    <div id="trades-panel">
      <div class="section-title">📋 最近交易</div>
      <div id="trade-list"></div>
    </div>
  </div>

  <!-- 买入信号 -->
  <div id="signals">
    <div class="section-title">🎯 今日信号 <span id="signal-count"></span></div>
    <div id="signal-list"></div>
    <div id="no-signals" class="empty">监控中，等待信号触发...</div>
  </div>
</div>

<script src="/static/app.js?v=9"></script>
</body></html>
