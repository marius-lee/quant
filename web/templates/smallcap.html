<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>小市值轮动 · ¥5000→¥100万</title>
<link rel="stylesheet" href="/static/style.css?v=19">
</head><body>

<div id="app">
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <a href="/" style="color:var(--muted)">陈小群</a>
    <a href="/etf" style="color:var(--muted)">ETF轮动</a>
    <b>小市值</b>
  </div>

  <div id="capital-bar">
    <div class="capital-row"><span>💰</span><span id="capital-amount">¥5,000</span></div>
    <div id="signal-info" style="font-size:13px;color:var(--muted);margin-top:4px"></div>
  </div>

  <div class="section-title">📊 本周选股 (Top5小市值)</div>
  <div id="pick-list"></div>

  <div class="section-title">💼 当前持仓</div>
  <div id="position-list"></div>
</div>

</div>

<script>
// 小市值轮动由调度线程自动执行(每周二9:00)
async function poll() {
  const r = await (await fetch('/api/smallcap/state')).json();
  document.getElementById('capital-amount').textContent = '¥'+(r.capital||5000).toLocaleString();
  const sig = r.signal || {};
  document.getElementById('signal-info').innerHTML =
    '操作: <b>'+sig.action+'</b> | 已实现盈亏: ¥'+(r.realized_pnl||0).toLocaleString()+
    (sig.reason?' | '+sig.reason:'');
  // Picks
  const picks = sig.picks || [];
  document.getElementById('pick-list').innerHTML = picks.length ? picks.map((p,i) =>
    '<div style="padding:6px 0;border-bottom:1px solid var(--border)">'+
    (i+1)+'. '+p.symbol+' '+p.name+' ¥'+p.close+
    '</div>'
  ).join('') : '<div class="empty">无信号 (可能空仓期)</div>';
  // Positions
  const ps = r.positions || [];
  if (ps.length) {
    document.getElementById('position-list').innerHTML = '<table class="pos-table"><thead><tr>'+
      '<th>代码</th><th>名称</th><th>数量</th><th>成本</th><th>现价</th><th>盈亏</th><th>市值</th>'+
      '</tr></thead><tbody>'+
      ps.map(p => {
        var pnl = p.pnl_pct || 0;
        var cls = pnl>=0 ? 'up' : 'down';
        return '<tr><td>'+p.symbol+'</td><td>'+(p.name||'')+'</td><td>'+p.shares+'股</td>'+
          '<td>¥'+p.price.toFixed(2)+'</td><td>¥'+(p.current||p.price).toFixed(2)+'</td>'+
          '<td class=\"'+cls+'\">'+(pnl>=0?'+':'')+pnl.toFixed(1)+'%</td>'+
          '<td>¥'+(p.value||0).toLocaleString()+'</td></tr>';
      }).join('')+
      '</tbody></table>';
  } else {
    document.getElementById('position-list').innerHTML = '<div class="empty">空仓</div>';
  }
}
poll();
setInterval(poll, 30000);
</script>
</body></html>
