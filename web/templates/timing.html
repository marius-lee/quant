<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>大盘择时 · ¥5000→¥100万</title>
<link rel="stylesheet" href="/static/style.css?v=19">
</head><body>

<div id="app">
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <a href="/" style="color:var(--muted)">陈小群</a>
    <a href="/etf" style="color:var(--muted)">ETF轮动</a>
    <a href="/smallcap" style="color:var(--muted)">小市值</a>
    <b>大盘择时</b>
  </div>

  <div id="capital-bar">
    <div class="capital-row"><span>💰</span><span id="capital-amount">¥5,000</span></div>
    <div id="signal-info" style="font-size:13px;color:var(--muted);margin-top:4px"></div>
  </div>

  <div class="section-title">💼 持仓</div>
  <div id="position-list"></div>
</div>

<script>
async function poll() {
  const r = await (await fetch('/api/timing/state')).json();
  document.getElementById('capital-amount').textContent = '¥'+(r.capital||5000).toLocaleString();
  const sig = r.signal||{};
  var cls = sig.action==='buy'?'color:var(--up)':'color:var(--muted)';
  document.getElementById('signal-info').innerHTML =
    '信号: <b style=\"'+cls+'\">'+sig.action+'</b> | 20日涨幅: '+(sig.ret_20d?(sig.ret_20d>=0?'+':'')+(sig.ret_20d*100).toFixed(1)+'%':'?')+
    (sig.reason?' | '+sig.reason:'');
  const ps = r.positions||[];
  if(ps.length) {
    document.getElementById('position-list').innerHTML = '<table class="pos-table"><thead><tr>'+
      '<th>代码</th><th>名称</th><th>数量</th><th>成本</th><th>现价</th><th>盈亏</th><th>市值</th></tr></thead><tbody>'+
      ps.map(p=>{
        var pnl=p.pnl_pct||0; var cls2=pnl>=0?'up':'down';
        return '<tr><td>'+p.symbol+'</td><td>'+(p.name||'')+'</td><td>'+p.shares+'股</td>'+
          '<td>¥'+p.price.toFixed(2)+'</td><td>¥'+(p.current||p.price).toFixed(2)+'</td>'+
          '<td class=\"'+cls2+'\">'+(pnl>=0?'+':'')+pnl.toFixed(1)+'%</td>'+
          '<td>¥'+(p.value||0).toLocaleString()+'</td></tr>';
      }).join('')+'</tbody></table>';
  } else {
    document.getElementById('position-list').innerHTML = '<div class="empty">空仓</div>';
  }
}
poll();setInterval(poll,3000);
</script>
</body></html>
